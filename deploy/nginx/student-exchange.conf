upstream student_exchange_frontend {
    server 127.0.0.1:18081;
}

upstream student_exchange_backend {
    server 127.0.0.1:18080;
}

upstream student_exchange_webhook {
    server 127.0.0.1:9000;
}

log_format student_exchange_webhook
    '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent '
    'host="$host" request_id="$request_id" '
    'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
    'upstream_response_time="$upstream_response_time"';

server {
    listen 80;
    server_name <YOUR_DOMAIN>;

    # GitHub webhook does not follow redirects; keep this path non-redirecting on HTTP.
    location = /webhook/github/deploy {
        include /etc/nginx/snippets/github-webhook-allowlist.conf;
        proxy_pass http://student_exchange_webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
        access_log /var/log/nginx/student-exchange-webhook.access.log student_exchange_webhook;
    }

    # Support trailing slash to avoid accidental path mismatch between systems.
    location = /webhook/github/deploy/ {
        include /etc/nginx/snippets/github-webhook-allowlist.conf;
        proxy_pass http://student_exchange_webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
        access_log /var/log/nginx/student-exchange-webhook.access.log student_exchange_webhook;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name <YOUR_DOMAIN>;

    ssl_certificate /etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location = /webhook/github/deploy {
        include /etc/nginx/snippets/github-webhook-allowlist.conf;
        proxy_pass http://student_exchange_webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
        access_log /var/log/nginx/student-exchange-webhook.access.log student_exchange_webhook;
    }

    location = /webhook/github/deploy/ {
        include /etc/nginx/snippets/github-webhook-allowlist.conf;
        proxy_pass http://student_exchange_webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
        access_log /var/log/nginx/student-exchange-webhook.access.log student_exchange_webhook;
    }

    location /api/ {
        proxy_pass http://student_exchange_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /ws/ {
        proxy_pass http://student_exchange_backend/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://student_exchange_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
