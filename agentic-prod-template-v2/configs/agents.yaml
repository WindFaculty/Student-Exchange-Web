agents:
  default:
    max_steps: 60
    require_plan: true
    require_diff: true
    require_tests_for_merge: true
    session_rules:
      - "Read project context docs and open task queue before coding"
      - "Work on one scoped task unless explicitly re-scoped"
      - "Use internal-only interfaces for agentic runtime integrations"
      - "Update docs/tasks when behavior or scope changes"
    stop_on:
      - "policy_violation"
      - "no_progress_3_steps"
      - "tests_failing_2_cycles"
      - "scope_creep_detected"
  roles:
    supervisor:
      focus: "multi-agent orchestration and policy gating"
    planner:
      focus: "task decomposition and dependency ordering"
    research:
      focus: "context gathering and source-backed findings"
    coder:
      focus: "implementation and tests"
    reviewer:
      focus: "risk, correctness, and regressions"
    debugger:
      focus: "failure analysis and root-cause fixes"
    docs:
      focus: "documentation and acceptance criteria updates"
