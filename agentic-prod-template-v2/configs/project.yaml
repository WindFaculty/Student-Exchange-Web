project:
  name: Student Exchange Web Platform
  description: >
    Full-stack Student Exchange platform with an internal multi-agent runtime.
    Runtime architecture uses Spring Boot + React + MySQL with Python sidecar orchestration.
  primary_languages:
    - java
    - typescript
    - python
  stack:
    backend: spring-boot
    frontend: react-vite
    database: mysql-8
    sidecar: fastapi-redis
  conventions:
    branching: "feature/*"
    commit_style: "task-id prefix + short imperative summary"
    code_style:
      backend: "layered architecture with explicit API contracts"
      frontend: "typed modules and centralized API clients"
      sidecar: "modular agents with explicit workflow contracts"
      infra: "small and reversible deployment changes"
  definition_of_done:
    - "Build/test checks pass for changed scope"
    - "Internal agentic endpoints remain non-public"
    - "No secrets are committed"
    - "Docs and task tracking are updated when behavior changes"

rag:
  include_globs:
    - "README.md"
    - "SETUP.md"
    - "docs/**/*.md"
    - "tasks/**/*.md"
    - "apps/**/src/**/*.*"
    - "apps/**/package.json"
    - "apps/**/pom.xml"
    - "ai-dev-system/**/*.py"
    - "ai-dev-system/**/*.yaml"
    - "ai-dev-system/**/*.md"
    - "ai-dev-system/Dockerfile"
    - "agentic-prod-template-v2/pyproject.toml"
    - "agentic-prod-template-v2/tools/*.py"
    - "agentic-prod-template-v2/.ai/**/*.md"
    - "agentic-prod-template-v2/docs/**/*.md"
    - "agentic-prod-template-v2/configs/*.yaml"
    - "agentic-prod-template-v2/configs/schemas/*.json"
  exclude_globs:
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/target/**"
    - "**/.git/**"
    - "**/.venv/**"
    - "agentic-prod-template-v2/data/**"
    - "ai-dev-system/.venv/**"
  chunking:
    code:
      strategy: "by_symbol"
      max_chars: 6000
    text:
      max_chars: 4000
