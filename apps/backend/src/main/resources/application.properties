server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student_exchange?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_vi_0900_ai_ci&connectionTimeZone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:student_exchange_web}
spring.datasource.password=${DB_PASSWORD:wind_faculty}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

logging.level.org.springframework.web=INFO
logging.level.com.ssg.iot=INFO

# Increase payload limits for Base64 image uploads
server.tomcat.max-http-form-post-size=50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Zalo OAuth2 Settings
zalo.app.id=${ZALO_APP_ID:}
zalo.app.secret=${ZALO_APP_SECRET:}
zalo.oauth.redirect-uri=${ZALO_REDIRECT_URI:}

# Frontend redirect base URL
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}

# Vietnam location sync settings
vn.location.enable-remote-sources=${VN_LOCATION_ENABLE_REMOTE_SOURCES:false}
vn.location.official.url=${VN_LOCATION_OFFICIAL_URL:}
vn.location.fallback.url=${VN_LOCATION_FALLBACK_URL:https://provinces.open-api.vn/api/?depth=3}
vn.location.local-curated.base-path=${VN_LOCATION_LOCAL_CURATED_PATH:Vietnam_Admin_After_Merge/data_csv_post_2025}
vn.location.http-timeout-seconds=${VN_LOCATION_HTTP_TIMEOUT_SECONDS:10}

# Agentic sidecar integration (internal only)
agentic.enabled=${AGENTIC_ENABLED:false}
agentic.sidecar.base-url=${AGENTIC_SIDECAR_BASE_URL:http://127.0.0.1:18082}
agentic.sidecar.connect-timeout-ms=${AGENTIC_SIDECAR_CONNECT_TIMEOUT_MS:2000}
agentic.sidecar.read-timeout-ms=${AGENTIC_SIDECAR_READ_TIMEOUT_MS:15000}
agentic.internal.token=${AGENTIC_INTERNAL_TOKEN:}
agentic.internal.allow-localhost=${AGENTIC_INTERNAL_ALLOW_LOCALHOST:true}
