name: student-exchange-prod

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  agentic-sidecar:
    build:
      context: ./ai-dev-system
      dockerfile: Dockerfile
    env_file:
      - ${BACKEND_ENV_FILE:?Set BACKEND_ENV_FILE to your backend.env path}
    environment:
      AGENTIC_HOST: 0.0.0.0
      AGENTIC_PORT: 8090
      AGENTIC_REDIS_URL: redis://redis:6379/0
      AGENTIC_TASK_ROOT: /app/tasks
      AGENTIC_WORKFLOWS_ROOT: /app/workflows
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:18082:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/internal/health').read()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    volumes:
      - agentic_runtime_tasks:/app/tasks
      - agentic_runtime_logs:/app/logs
      - agentic_runtime_memory:/app/memory
      - agentic_runtime_workspace:/app/workspace

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - ${BACKEND_ENV_FILE:?Set BACKEND_ENV_FILE to your backend.env path}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      agentic-sidecar:
        condition: service_healthy
    ports:
      - "127.0.0.1:18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:18081:80"

volumes:
  agentic_runtime_tasks:
  agentic_runtime_logs:
  agentic_runtime_memory:
  agentic_runtime_workspace:
